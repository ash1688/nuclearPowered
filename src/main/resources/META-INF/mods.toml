modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/ash1688/nuclearPowered/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="https://github.com/ash1688/nuclearPowered"
authors="${mod_authors}"
description='''${mod_description}'''

[[dependencies.${mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

# FTB Quests is mandatory for the shipped mod (the shop & progression live in FTBQ).
# Marked optional during M1-M7 development so the dev workspace can launch without it.
# Promote to mandatory=true in M9 when quest chapters and the shop hook are wired up.
[[dependencies.${mod_id}]]
    modId="ftbquests"
    mandatory=false
    versionRange="[2002,)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="jei"
    mandatory=false
    versionRange="[15,)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="cloth_config"
    mandatory=false
    versionRange="[11,)"
    ordering="AFTER"
    side="BOTH"
